version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: estudiantes_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__Postgres=Host=db;Database=estudiantes_db;Username=postgres;Password=12345
      - Jwt__Clave=12345678901234567890123456789012
    depends_on:
      - db

volumes:
  pgdata:
