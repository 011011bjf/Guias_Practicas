<div class="card-form">
  <h3>✨ Agregar Nuevo Producto</h3>
  <p class="subtitle">Ingresa los datos para persistir en PostgreSQL</p>

  <form (ngSubmit)="guardar()" #form="ngForm">
    <div class="form-group">
      <label for="nombre">Nombre del producto</label>
      <input
        id="nombre"
        type="text"
        [(ngModel)]="nombre"
        name="nombre"
        placeholder="Ej: Teclado Mecánico RGB"
        required
        class="input-modern"
      />
    </div>

    <div class="form-row">
      <div class="form-group flex-1">
        <label for="precio">Precio ($)</label>
        <input
          id="precio"
          type="number"
          step="0.01"
          [(ngModel)]="precio"
          name="precio"
          placeholder="0.00"
          required
          class="input-modern"
        />
      </div>

      <div class="form-group flex-1">
        <label for="stock">Cantidad en Stock</label>
        <input
          id="stock"
          type="number"
          [(ngModel)]="stock"
          (ngModelChange)="onStockChange($event)"
          name="stock"
          placeholder="0"
          required
          class="input-modern"
        />
      </div>

      <div class="form-group checkbox-group">
        <label class="toggle-label">
          <input
            type="checkbox"
            [(ngModel)]="disponible"
            name="disponible"
          />
          <span class="toggle-custom"></span>
          <span class="toggle-text">¿Disponible?</span>
        </label>
      </div>
    </div>

    @if (mensajeError()) {
      <div class="error-badge">⚠️ {{ mensajeError() }}</div>
    }

    @if (guardando()) {
      <button type="button" disabled class="btn-primary guardando">
        ⏳ Guardando en servidor...
      </button>
    } @else {
      <button type="submit" class="btn-primary" [disabled]="!nombre || precio <= 0 || stock < 0">
        💾 Guardar Producto
      </button>
    }
  </form>
</div>
