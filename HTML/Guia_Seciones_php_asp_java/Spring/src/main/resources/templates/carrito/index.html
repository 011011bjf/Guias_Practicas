<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Carrito Spring Boot</title>
<style>
body{font-family:Arial,sans-serif;max-width:800px;margin:2rem auto}
table{width:100%;border-collapse:collapse;margin-top:1rem}
th,td{padding:8px 12px;border:1px solid #ddd;text-align:left}
th{background:#f49b32;color:white}
.btn{padding:6px 14px;border:none;border-radius:4px;cursor:pointer}
.btn-add{background:#27ae60;color:white}
.btn-del{background:#e74c3c;color:white}
.btn-clear{background:#7f8c8d;color:white}
.btn-destroy{background:#8e44ad;color:white}
</style>
</head>
<body>
<h1>Tienda - Sesión Spring Boot</h1>

<!-- Catálogo -->
<h2>Catálogo</h2>
<form th:action="@{/carrito/agregar}" method="post">
  <select name="nombre">
    <option th:each="item : ${catalogo}"
            th:value="${item}" th:text="${item}"></option>
  </select>
  <button class="btn btn-add">Agregar al carrito</button>
</form>

<!-- Carrito -->
<h2>Carrito</h2>
<div th:if="${#lists.isEmpty(carrito)}">
  <p>El carrito está vacío.</p>
  <form th:action="@{/carrito/destruir}" method="post" style="margin-top:1rem;">
    <button class="btn btn-destroy" title="Destruye la sesión actual y crea una nueva cookie CARRITO_SESSION">
      🔄 Destruir y Nueva Sesión (Cambiar Cookie)
    </button>
  </form>
</div>

<div th:if="${!#lists.isEmpty(carrito)}">
  <table>
    <tr><th>Producto</th><th>Precio</th><th>Acción</th></tr>
    <tr th:each="item,iter : ${carrito}">
      <td th:text="${item.nombre}"></td>
      <td th:text="'$' + ${item.precio}"></td>
      <td>
        <form th:action="@{/carrito/eliminar}" method="post"
              style="margin:0">
          <input type="hidden" name="indice"
                 th:value="${iter.index}">
          <button class="btn btn-del">Eliminar</button>
        </form>
      </td>
    </tr>
  </table>
  <p><strong th:text="'Total: $' + ${total}"></strong></p>
  <div style="display:flex;gap:10px;flex-wrap:wrap;">
    <form th:action="@{/carrito/limpiar}" method="post" style="margin:0;">
      <button class="btn btn-clear" title="Borra los ítems pero mantienes el mismo Session ID">
        🧹 Vaciar carrito (Mantener sesión)
      </button>
    </form>
    <form th:action="@{/carrito/destruir}" method="post" style="margin:0;">
      <button class="btn btn-destroy" title="Destruye la sesión actual y crea una nueva cookie CARRITO_SESSION">
        🔄 Destruir y Nueva Sesión (Cambiar Cookie)
      </button>
    </form>
  </div>
</div>

<p style="color:#999;font-size:0.8rem"
   th:text="'Session ID: ' + ${sessionId}"></p>
</body>
</html>
