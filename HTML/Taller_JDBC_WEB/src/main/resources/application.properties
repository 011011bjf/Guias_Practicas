spring.application.name=Taller_JDBC_WEB

# Configuración de Conexión a PostgreSQL (equivalente a Conexion.java)
spring.datasource.url=jdbc:postgresql://localhost:5432/taller_db
spring.datasource.username=taller
spring.datasource.password=taller
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
